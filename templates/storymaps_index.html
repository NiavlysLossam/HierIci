{% load static %}
<!DOCTYPE html>
<html class="light" lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storymaps — HierIci</title>
    <meta name="description" content="Explorez les storymaps HierIci : des récits cartographiés à travers le temps.">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&amp;family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/main.css' %}?v=2">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline-variant": "#b0b1bc",
                        "surface-bright": "#faf8fe",
                        "on-tertiary": "#fff6ff",
                        "surface-tint": "#235abf",
                        "surface-container-highest": "#e1e2ed",
                        "on-surface-variant": "#5d5f68",
                        "primary-fixed-dim": "#5988f0",
                        "surface-container": "#ededf6",
                        surface: "#faf8fe",
                        /* Redefining primary specifically */
                        primary: "#235abf",
                    },
                    fontFamily: {
                        headline: ["Public Sans", "sans-serif"],
                        body: ["Public Sans", "sans-serif"],
                        label: ["Public Sans", "sans-serif"],
                        display: ["Public Sans", "sans-serif"]
                    }
                }
            }
        };
    </script>
</head>

<body class="bg-[#faf9f5] font-body text-slate-800 flex flex-col min-h-screen antialiased">

    <!-- TopNavBar (Harmonisée) -->
    <header class="fixed top-0 left-0 right-0 z-[60] px-6 py-3 flex justify-between items-center bg-[#faf9f5]/90 backdrop-blur-md shadow-sm">
        <div class="flex items-center gap-8">
            <span class="text-2xl font-serif font-bold text-[#0d2e4e]">HierIci</span>
            <nav class="hidden md:flex items-center gap-6 ml-4">
                <a class="text-sm font-bold text-slate-500 hover:text-primary transition-colors" href="/">Carte</a>
                <a class="text-sm font-bold text-primary border-b-2 border-primary pb-1" href="/storymaps/">Storymaps</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <a href="/" class="text-sm font-bold text-slate-500 hover:text-primary flex items-center gap-1 transition-colors">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Retour à la carte
            </a>
        </div>
    </header>

    <main class="flex-1 mt-20 md:mt-24 w-full">
        <!-- Hero Section -->
        <section class="max-w-7xl mx-auto px-6 md:px-12 py-10 md:py-16">
            <div class="inline-block px-3 py-1 bg-amber-500/10 text-amber-700 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4">Bibliothèque historique</div>
            <h1 class="text-4xl md:text-5xl font-headline font-bold text-[#0d2e4e] tracking-tight leading-tight mb-4">Storymaps</h1>
            <p class="text-lg text-slate-600 max-w-2xl leading-relaxed">
                Explorez le territoire à travers des récits géographiques interactifs, tissés autour de véritables photographies anciennes géolocalisées.
            </p>
        </section>

        <!-- Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 px-6 md:px-12 pb-24 max-w-7xl mx-auto w-full" id="storymaps-grid">
            <!-- Rempli dynamiquement par JS -->
        </div>
    </main>

    <script>
        (async function () {
            const grid = document.getElementById('storymaps-grid');

            try {
                const res = await fetch('/api/storymaps/');
                if (!res.ok) throw new Error('Erreur réseau');
                const storymaps = await res.json();

                if (!storymaps.length) {
                    grid.innerHTML = `
                    <div class="col-span-full py-20 text-center flex flex-col items-center justify-center opacity-60">
                        <span class="material-symbols-outlined text-6xl mb-4 text-slate-400">landscape</span>
                        <p class="text-lg font-medium text-slate-500">Aucune storymap publiée pour l'instant.</p>
                    </div>`;
                    return;
                }

                storymaps.forEach(sm => {
                    const thumb = sm.thumbnail_url
                        ? `<img class="w-full aspect-[16/9] object-cover scale-[1.01] group-hover:scale-105 transition-transform duration-500" src="${sm.thumbnail_url}" alt="${sm.title}" loading="lazy">`
                        : `<div class="w-full aspect-[16/9] bg-gradient-to-br from-slate-200 to-slate-300 flex items-center justify-center">
                            <span class="material-symbols-outlined text-4xl text-white/50">image</span>
                           </div>`;

                    const chapLabel = sm.chapter_count > 1
                        ? `${sm.chapter_count} chapitres`
                        : sm.chapter_count === 1 ? '1 chapitre' : '';

                    const card = document.createElement('a');
                    card.href = `/storymap/${sm.slug}/`;
                    card.className = 'glass-panel rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 transform md:hover:-translate-y-2 group flex flex-col border border-outline-variant/15 text-left block w-full';
                    card.innerHTML = `
                    <div class="overflow-hidden w-full relative">
                        ${thumb}
                        <div class="absolute inset-0 bg-primary/0 group-hover:bg-primary/10 transition-colors duration-300"></div>
                    </div>
                    <div class="p-6 md:p-8 flex flex-col gap-3 flex-1 bg-surface-container-lowest">
                        ${chapLabel ? `<div class="text-[10px] font-bold tracking-widest uppercase text-primary">${chapLabel}</div>` : ''}
                        <h2 class="text-xl font-headline font-bold text-[#0d2e4e] leading-tight group-hover:text-primary transition-colors">${sm.title}</h2>
                        ${sm.description ? `<p class="text-sm text-slate-500 line-clamp-3 leading-relaxed mt-1">${sm.description}</p>` : ''}
                        
                        <div class="mt-auto pt-6 flex items-center gap-2 text-[11px] font-bold uppercase tracking-wider text-slate-400 group-hover:text-primary transition-colors">
                            <span>Explorer</span>
                            <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </div>
                    </div>`;
                    grid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div class="col-span-full py-20 text-center flex flex-col items-center justify-center opacity-60"><p class="text-lg font-medium text-slate-500">Impossible de charger les storymaps.</p></div>`;
            }
        })();
    </script>
</body>
</html>
